        }
        /* Custom scrollbar for web */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {

                                            <button class="w-full flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 font-medium rounded-xl transition">
                                                <i class="fa-solid fa-database w-6"></i> Backup & Data
                                            </button>
                                        </nav>
                                    </div>
                                    
                                    <!-- Settings Content -->
                                    <div class="md:col-span-2 p-8">
                                        <h3 class="text-2xl font-bold text-gray-800 mb-6">School Profile Configuration</h3>
                                        
                                        <form class="space-y-6">
                                            <div class="flex items-center space-x-6 mb-6">
                                                <div class="w-24 h-24 bg-gray-100 border-2 border-dashed border-gray-300 rounded-xl flex items-center justify-center text-gray-400 hover:bg-gray-50 hover:text-skyApp hover:border-skyApp cursor-pointer transition">
                                                    <div class="text-center">
                                                        <i class="fa-solid fa-camera text-2xl mb-1"></i>
                                                        <span class="block text-xs font-semibold">Change Logo</span>
                                                    </div>
                                                </div>
                                                <div>
                                                    <h4 class="font-bold text-gray-800">School Logo</h4>
                                                    <p class="text-sm text-gray-500">Update your school's official logo. Recommended size 256x256px.</p>
                                                </div>
                                            </div>

                                            <div>
                                                <label class="block text-sm font-bold text-gray-700 mb-2">Institution Name</label>
                                                <input type="text" value="EduManage International School" class="w-full bg-gray-50 border border-gray-200 py-3 px-4 rounded-xl focus:outline-none focus:border-skyApp focus:ring-1 focus:ring-skyApp transition">
                                            </div>
                                            
                                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                                <div>
                                                    <label class="block text-sm font-bold text-gray-700 mb-2">Contact Email</label>
                                                    <input type="email" value="admin@edumanage.com" class="w-full bg-gray-50 border border-gray-200 py-3 px-4 rounded-xl focus:outline-none focus:border-skyApp focus:ring-1 focus:ring-skyApp transition">
                                                </div>
                                                <div>
                                                    <label class="block text-sm font-bold text-gray-700 mb-2">Phone Number</label>
                                                    <input type="text" value="+1 (555) 000-1234" class="w-full bg-gray-50 border border-gray-200 py-3 px-4 rounded-xl focus:outline-none focus:border-skyApp focus:ring-1 focus:ring-skyApp transition">
                                                </div>
                                            </div>

                                            <div>
                                                <label class="block text-sm font-bold text-gray-700 mb-2">Official Address</label>
                                                <textarea rows="3" class="w-full bg-gray-50 border border-gray-200 py-3 px-4 rounded-xl focus:outline-none focus:border-skyApp focus:ring-1 focus:ring-skyApp transition">123 Education Boulevard, Main District, City 40001</textarea>
                                            </div>

                                            <div class="pt-4 border-t border-gray-100 flex justify-end">
                                                <button type="button" class="bg-gray-100 text-gray-600 font-bold py-2.5 px-6 rounded-xl mr-3 hover:bg-gray-200 transition">Cancel</button>
                                                <button type="button" class="bg-skyApp text-white font-bold py-2.5 px-8 rounded-xl shadow-sm hover:bg-blue-400 transition">Save Changes</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `
                }
            }
        };

        let currentRole = null;
        let activeTab = 'home';

        // Core Functions
        function login(role) {
            currentRole = role;
            activeTab = 'home';
            
            // UI Updates
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('app-shell').classList.remove('hidden');
            
            // Set Header/Sidebar infos
            document.getElementById('sidebar-greeting').innerText = appData[role].greeting;
            document.getElementById('sidebar-name').innerText = appData[role].name;
            
            // Set header avatar appropriately based on role (simple placeholder logic)
            const avatarUrl = `https://ui-avatars.com/api/?name=${appData[role].name.replace(' ', '+')}&background=87CEEB&color=fff`;
            document.getElementById('header-avatar').src = avatarUrl;

            // Render Layout
            renderNav();
            renderPage(activeTab);
        }

        function logout() {
            currentRole = null;
            document.getElementById('app-shell').classList.add('hidden');
            document.getElementById('login-view').classList.remove('hidden');
        }

        function switchTab(tabId) {
            activeTab = tabId;
            renderNav(); // Re-render to update active state
            renderPage(tabId); // Render specific page HTML
        }

        function renderNav() {
            const sidebarContainer = document.getElementById('sidebar-nav-container');
            const mobileContainer = document.getElementById('mobile-nav-container');
            const items = appData[currentRole].nav;
            
            // Desktop Sidebar Render
            sidebarContainer.innerHTML = items.map(item => {
                const isActive = item.id === activeTab;
                const activeClass = isActive 
                    ? 'bg-skyApp/10 text-skyApp font-bold border-r-4 border-skyApp' 
                    : 'text-gray-600 hover:bg-gray-100 hover:text-gray-900 font-medium border-r-4 border-transparent';
                
                return `
                    <button onclick="switchTab('${item.id}')" class="w-full flex items-center px-4 py-3 rounded-lg transition-all duration-200 ${activeClass}">
                        <i class="fa-solid ${item.icon} w-8 text-lg ${isActive ? 'text-skyApp' : 'text-gray-400'}"></i>
                        <span>${item.label}</span>
                    </button>
                `;
            }).join('');

            // Mobile Bottom Nav Render
            mobileContainer.innerHTML = items.map(item => {
                const isActive = item.id === activeTab;
                const colorClass = isActive ? 'text-skyApp' : 'text-gray-400 hover:text-gray-600';
                const indicator = isActive ? '<div class="absolute -top-3 w-1 h-1 bg-skyApp rounded-full"></div>' : '';
                
                return `
                    <button onclick="switchTab('${item.id}')" class="flex flex-col items-center justify-center w-full h-full relative transition-colors duration-200 ${colorClass}">
                        ${indicator}
                        <i class="fa-solid ${item.icon} text-xl mb-1 transition-transform ${isActive ? 'scale-110' : ''}"></i>
                        <span class="text-[10px] font-medium hidden sm:block">${item.label}</span>
                    </button>
                `;
            }).join('');
        }

        function renderPage(tabId) {
            const contentArea = document.getElementById('main-content');
            
            // Get the HTML string from the active role's pages object
            const pageHTML = appData[currentRole].pages[tabId];
            
            clearCharts();

            if (pageHTML) {
                contentArea.innerHTML = pageHTML;
                
                // Initialize charts if on the home tab
                if (tabId === 'home') {
                    // Small timeout ensures the DOM is fully updated and painted before targeting the canvas ID
                    setTimeout(() => initDashboardCharts(currentRole), 50);
                }
            } else {
                // Failsafe fallback
                const title = tabId.charAt(0).toUpperCase() + tabId.slice(1);
                contentArea.innerHTML = `
                    <div class="fade-in flex flex-col items-center justify-center h-full text-center mt-20">
                        <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 text-4xl mb-6 shadow-sm">
                            <i class="fa-solid fa-triangle-exclamation"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-gray-800 mb-2">Page Under Construction</h2>
                        <p class="text-gray-500 max-w-md mx-auto">The ${title} module is currently being updated for the new web interface. Check back later!</p>
                    </div>
                `;
            }
            
            // Scroll to top of content area on tab switch
            contentArea.scrollTop = 0;
        }

        // --- Chart.js Graph Initialization Logic ---
        let activeCharts = {};

        function clearCharts() {
            for (let key in activeCharts) {
                if (activeCharts[key]) {
                    activeCharts[key].destroy();
                }
            }
            activeCharts = {};
        }

        function initDashboardCharts(role) {
            Chart.defaults.color = '#9ca3af';
            Chart.defaults.font.family = 'ui-sans-serif, system-ui, sans-serif';

            if (role === 'student') {
                const attCtx = document.getElementById('studentAttendanceChart');
                if (attCtx) {
                    activeCharts['studentAttendance'] = new Chart(attCtx, {
                        type: 'bar',
                        data: {
                            labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'],
                            datasets: [{
                                label: 'Attendance %',
                                data: [100, 100, 0, 100, 100],
                                backgroundColor: '#87CEEB',
                                borderRadius: 6
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } }, plugins: { legend: { display: false } } }
                    });
                }
                const perfCtx = document.getElementById('studentPerformanceChart');
                if (perfCtx) {
                    activeCharts['studentPerformance'] = new Chart(perfCtx, {
                        type: 'line',
                        data: {
                            labels: ['Term 1', 'Term 2', 'Term 3'],
                            datasets: [{
                                label: 'CGPA',
                                data: [3.4, 3.6, 3.8],
                                borderColor: '#a855f7',
                                backgroundColor: 'rgba(168, 85, 247, 0.1)',
                                fill: true,
                                tension: 0.4,
                                borderWidth: 3
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: false, min: 2.0, max: 4.0 } }, plugins: { legend: { display: false } } }
                    });
                }
            } else if (role === 'parent') {
                const attCtx = document.getElementById('parentAttendanceChart');
                if (attCtx) {
                    activeCharts['parentAttendance'] = new Chart(attCtx, {
                        type: 'bar',
                        data: {
                            labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'],
                            datasets: [
                                { label: 'Alex', data: [100, 100, 0, 100, 100], backgroundColor: '#87CEEB', borderRadius: 4 },
                                { label: 'Emma', data: [100, 100, 100, 100, 100], backgroundColor: '#f9a8d4', borderRadius: 4 }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } } }
                    });
                }
                const feeCtx = document.getElementById('parentFeeChart');
                if (feeCtx) {
                    activeCharts['parentFee'] = new Chart(feeCtx, {
                        type: 'doughnut',
                        data: {
                            labels: ['Tuition', 'Transport', 'Activities'],
                            datasets: [{
                                data: [65, 20, 15],
                                backgroundColor: ['#ef4444', '#f59e0b', '#3b82f6'],
                                borderWidth: 0,
                                hoverOffset: 4
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'right' } } }
                    });
                }
            } else if (role === 'teacher') {
                const perfCtx = document.getElementById('teacherPerformanceChart');
                if (perfCtx) {
                    activeCharts['teacherPerformance'] = new Chart(perfCtx, {
                        type: 'bar',
                        data: {
                            labels: ['Grade 10A', 'Grade 10B', 'Grade 11C'],
                            datasets: [{
                                label: 'Average Score %',
                                data: [85, 76, 92],
                                backgroundColor: ['#87CEEB', '#818cf8', '#a855f7'],
                                borderRadius: 6
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } }, plugins: { legend: { display: false } } }
                    });
                }
                const assignCtx = document.getElementById('teacherAssignmentChart');
                if (assignCtx) {
                    activeCharts['teacherAssignment'] = new Chart(assignCtx, {
                        type: 'doughnut',
                        data: {
                            labels: ['Graded', 'Pending', 'Overdue'],
                            datasets: [{
                                data: [45, 12, 3],
                                backgroundColor: ['#10b981', '#f59e0b', '#ef4444'],
                                borderWidth: 0,
                                hoverOffset: 4
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'right' } } }
                    });
                }
            } else if (role === 'admin') {
                const finCtx = document.getElementById('adminFinanceChart');
                if (finCtx) {
                    activeCharts['adminFinance'] = new Chart(finCtx, {
                        type: 'line',
                        data: {
                            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                            datasets: [
                                { label: 'Income', data: [42000, 43500, 41000, 48000, 46000, 45200], borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', fill: true, tension: 0.3 },
                                { label: 'Expense', data: [11000, 11500, 10500, 13000, 12000, 12100], borderColor: '#ef4444', backgroundColor: 'transparent', borderDash: [5, 5], tension: 0.3 }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
                    });
                }
                const enrCtx = document.getElementById('adminEnrollmentChart');
                if (enrCtx) {
                    activeCharts['adminEnrollment'] = new Chart(enrCtx, {
                        type: 'pie',
                        data: {
                            labels: ['Elementary', 'Middle School', 'High School'],
                            datasets: [{
                                data: [450, 380, 415],
                                backgroundColor: ['#3b82f6', '#8b5cf6', '#ec4899'],
                                borderWidth: 0,
                                hoverOffset: 4
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
                    });
                }
            }
        }

    </script>
</body>
</html>
